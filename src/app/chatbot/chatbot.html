<div class="chat-widget">
  <button class="chat-button" (click)="toggleChat()">
    @if (!isOpen) {
      <img src="/assets/images/lkuna.png" alt="Chat logo" class="chat-logo">
    } @else {
      <span>X</span>
    }
  </button>

  @if (showWelcomeBubble && !isOpen) {
    <div class="welcome-bubble">
      {{ welcomeMessage }}
    </div>
  }

  @if (isOpen) {
    <div class="chat-window">
    <div class="chat-header">
      <img src="/assets/images/lkuna.png" alt="Luna logo" class="logo">
      <h3>Luna</h3>
    </div>
    <div class="chat-body">
        @for (message of messages; track message) {
          <div class="message" [class.user-message]="message.isUser" [class.assistant-message]="!message.isUser">
            <p>{{message.text}}</p>
          </div>
        }
        @if (isLoading) {
          <div class="message"><div class="loading-spinner"></div></div>
        }
    </div>
    <div class="chat-footer">
      <input type="text" [placeholder]="placeholder" [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" [disabled]="isLoading">
      <button (click)="sendMessage()" [disabled]="isLoading">Send</button>
    </div>
  </div>
}
</div>
