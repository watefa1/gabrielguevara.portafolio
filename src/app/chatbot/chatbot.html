<div class="chat-widget">
  <button class="chat-button" (click)="toggleChat()">
    @if (!isOpen) {
      <span>AI</span>
    } @else {
      <span>X</span>
    }
  </button>

  @if (isOpen) {
    <div class="chat-window">
    <div class="chat-header">
      <h3>AI Portfolio Assistant</h3>
    </div>
    <div class="chat-body">
        @for (message of messages; track message) {
          <div class="message" [class.user-message]="message.isUser" [class.assistant-message]="!message.isUser">
            <p>{{message.text}}</p>
          </div>
        }
        @if (isLoading) {
          <div class="message"><div class="loading-spinner"></div></div>
        }
    </div>
    <div class="chat-footer">
      <input type="text" placeholder="Ask me a question..." [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" [disabled]="isLoading">
      <button (click)="sendMessage()" [disabled]="isLoading">Send</button>
    </div>
  </div>
}
</div>
